<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #6a0dad, #4facfe);
    color: white;
    overflow: hidden;
    transition: 0.5s;
}

.dark {
    background: #0a0a0a;
}

.container {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
}

.photo {
    width: 170px;
    border-radius: 50%;
    margin: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.4);
    transition: 0.5s;
}

.photo:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px #ff69b4;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    margin-top: 15px;
    cursor: pointer;
    background: white;
    color: #6a0dad;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.toggle {
    position: absolute;
    top: 15px;
    right: 15px;
}

.message {
    margin-top: 20px;
    font-size: 20px;
    opacity: 0;
    transition: 1s;
    min-height: 60px;
}

.hearts span {
    position: absolute;
    color: pink;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { top: -10%; opacity: 0; }
    100% { top: 110%; opacity: 1; }
}
</style>

    <p>Aku cuma mau kamu baca ini pelan-pelan...</p>

    <button onclick="start()">Klik perlahan 🥺</button>

    <div id="message" class="message"></div>
</div>

<script>
const texts = [
    "Aku ga tau sejak kapan semuanya terasa beda...",
    "Hal kecil tentang kamu jadi hal yang aku ingat...",
    "Pelan-pelan kamu jadi bagian dari hariku...",
    "Dan tanpa aku sadari...",
    "Aku nyaman sama kamu...",
    "Aku sayang kamu 💜"
];

let index = 0;

function start() {
    playMusic();
    showText();
}

function showText() {
    if (index < texts.length) {
        const msg = document.getElementById("message");
        msg.style.opacity = 1;
        msg.innerText = texts[index];
        index++;
    }
}

function playMusic() {
    document.getElementById("music").play();
}

function toggleMode() {
    document.body.classList.toggle("dark");
}

// love jatuh
const hearts = document.querySelector(".hearts");

for (let i = 0; i < 40; i++) {
    let span = document.createElement("span");
    span.innerHTML = "💖";
    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (Math.random() * 3 + 2) + "s";
    hearts.appendChild(span);
}
</script>

</body>
