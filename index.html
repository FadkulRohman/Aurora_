<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Virza 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #6a0dad, #4facfe);
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* container tengah */
.container {
    text-align: center;
    padding: 20px;
}

/* tombol */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: white;
    color: #6a0dad;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* teks muncul */
.message {
    margin-top: 25px;
    font-size: 20px;
    opacity: 0;
    transition: 1s;
    min-height: 60px;
}

/* love jatuh */
.hearts span {
    position: absolute;
    color: pink;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { top: -10%; opacity: 0; }
    100% { top: 110%; opacity: 1; }
}
</style>

</head>
<body>

<!-- musik -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<div class="hearts"></div>

<div class="container">
    <h1>Aurora Virza 💜</h1>

    <p>Aku cuma mau kamu baca ini pelan-pelan...</p>

    <button onclick="start()">Klik perlahan 🥺</button>

    <div id="message" class="message"></div>
</div>

<script>
const texts = [
    "Aku ga tau sejak kapan semuanya berubah...",
    "Hal kecil tentang kamu jadi hal yang aku ingat...",
    "Pelan-pelan kamu jadi bagian dari hariku...",
    "Dan tanpa aku sadari...",
    "Aku nyaman sama kamu...",
    "Aku sayang kamu 💜"
];

let index = 0;

function start() {
    playMusic();
    showText();
}

function showText() {
    if (index < texts.length) {
        const msg = document.getElementById("message");
        msg.style.opacity = 1;
        msg.innerText = texts[index];
        index++;
    }
}

function playMusic() {
    document.getElementById("music").play();
}

// love jatuh
const hearts = document.querySelector(".hearts");

for (let i = 0; i < 35; i++) {
    let span = document.createElement("span");
    span.innerHTML = "💖";
    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (Math.random() * 3 + 2) + "s";
    hearts.appendChild(span);
}
</script>

</body>
</html>
